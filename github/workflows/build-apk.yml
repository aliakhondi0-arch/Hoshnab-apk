name: Build APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # امکان اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate APK
        run: |
          bubblewrap init --manifest="https://hoshnab.ir/manifest.json" --directory="twap" --package="ir.hoshnab.app"
          # تولید کلید امضا (فقط برای بار اول)
          keytool -genkey -v -keystore ./release.keystore -alias hoshnab -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=HoshNab, OU=HoshNab, O=HoshNab, L=Tehran, S=Tehran, C=IR"
          # ساخت پروژه
          bubblewrap build --directory="twap" \
            --signingKeyPath=../release.keystore \
            --signingKeyAlias=hoshnab \
            --signingKeyPassword=android \
            --signingKeyStorePassword=android
          # انتقال APK به پوشه قابل دسترس
          mkdir output
          cp twap/app/build/outputs/apk/release/*.apk output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hoshnab-apk
          path: output/
